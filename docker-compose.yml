version: '3.8'

services:
  markitdown-web:
    build: .
    image: markitdown-web:latest
    container_name: markitdown-web-app
    ports:
      - "127.0.0.1:8000:8000"
    restart: always
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      # 호스트의 설정 파일을 컨테이너 내부에 공유하여 실시간 반영
      - ./config.json:/app/config.json
      # 로컬 임시 작업 및 로그 출력을 공유하는 워크스페이스 마운트
      - ./workspace:/app/workspace
